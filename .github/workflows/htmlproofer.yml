name: HTMLProofer

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll and html-proofer
        run: |
          gem install jekyll bundler html-proofer

      - name: Build Jekyll site
        run: jekyll build

      - name: Test HTML with htmlproofer
        run: |
          htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --check-html \
            --empty-alt-ignore \
            --url-ignore "/#/,#,/localhost:4000/"
