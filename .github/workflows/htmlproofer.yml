name: HTMLProofer

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site
        run: |
          gem install bundler
          bundle install
          bundle exec jekyll build

      - name: Install htmlproofer
        run: gem install html-proofer

      - name: Test HTML with htmlproofer
        run: htmlproofer ./_site --disable-external --allow-hash-href --check-html
